# ------------------------------------
# Settings
# ------------------------------------

# Open new panes in same dir as current one
# -c "#{pane_current_path}"

# Turn on mouse mode
set -g mouse on

# System clipboard integration (macOS native)
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"

# Paste with prefix+p (or just cmd+v works in most terminals)
bind p run "pbpaste | tmux load-buffer - && tmux paste-buffer"

# ------------------------------------
# Key bindings
# ------------------------------------

# Prefix key: Ctl+a
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

# Split panes vertically: Prefix,|
bind | split-window -h -c "#{pane_current_path}"
unbind %
# Split panes horizontally: Prefix,-
bind - split-window -v -c "#{pane_current_path}"
unbind '"'

# Navigate panes: Crl+arrow keys
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# Reload the config file: Prefix,r 
bind r source-file ~/.tmux.conf \; display "Config Reloaded!"
